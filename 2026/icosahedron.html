<!DOCTYPE html>
<html>

<head>
	<title>three.js css3d + sphere</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no,
			  minimum-scale=1.0, maximum-scale=1.0">

	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		#container {
			position: relative;
			width: 100%;
			height: 100%;
		}

		#blocker {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>

	<script src="../2024/three/div/three.js"></script>
	<script src="../2024/three/div/TrackballControls.js"></script>
	<script src="../2024/three/div/CSS3DRenderer.js"></script>

	<div id="container"></div>
	<div id="blocker"></div>

	<script>

		var camera, scene;
		var cssRenderer, glRenderer;
		var controls;

		// Creates a webpage plane
		var DivPlane = function (
			id,
			x, y, z,
			w = 480,
			h = 360,
			rx = 0,
			ry = 0,
			rz = 0
		) {

			var div = document.createElement('div');

			div.style.width = w + 'px';
			div.style.height = h + 'px';
			div.style.backgroundColor = '#000';

			var iframe = document.createElement('iframe');

			iframe.style.width = w + 'px';
			iframe.style.height = h + 'px';
			iframe.style.border = '0px';

			iframe.src = id;

			div.appendChild(iframe);

			var object = new THREE.CSS3DObject(div);

			object.position.set(x, y, z);

			object.rotation.x = rx;
			object.rotation.y = ry;
			object.rotation.z = rz;

			return object;
		};

		init();
		animate();

		function init() {

			var container = document.getElementById('container');

			// CAMERA

			camera = new THREE.PerspectiveCamera(
				50,
				window.innerWidth / window.innerHeight,
				1,
				5000
			);

			camera.position.set(500, 350, 750);

			// SCENE

			scene = new THREE.Scene();

			// CSS RENDERER (webpages)

			cssRenderer = new THREE.CSS3DRenderer();

			cssRenderer.setSize(
				window.innerWidth,
				window.innerHeight
			);

			cssRenderer.domElement.style.position = 'absolute';
			cssRenderer.domElement.style.top = '0';

			container.appendChild(cssRenderer.domElement);

			// WEBGL RENDERER (3D objects)

			glRenderer = new THREE.WebGLRenderer({
				alpha: true,
				antialias: true
			});

			glRenderer.setSize(
				window.innerWidth,
				window.innerHeight
			);

			glRenderer.domElement.style.position = 'absolute';
			glRenderer.domElement.style.top = '0';

			// Allows mouse events to pass through
			glRenderer.domElement.style.pointerEvents = 'none';

			container.appendChild(glRenderer.domElement);

			// ADD WEBPAGE

			var webpage = new DivPlane('https://squanky1372.github.io', 0, 0, 0);

			// scene.add(webpage);

			// ADD SPHERE



			setupSpheres();

			// OPTIONAL LIGHTING
			// (not needed for MeshBasicMaterial)

			// CONTROLS

			controls = new THREE.TrackballControls(camera, cssRenderer.domElement);

			controls.rotateSpeed = 4;

			// RESIZE

			window.addEventListener('resize', onWindowResize, false);

			// BLOCK IFRAME INTERACTION
			// while rotating camera

			var blocker = document.getElementById('blocker');

			blocker.style.display = 'none';

			document.addEventListener('mousedown', function () {
				blocker.style.display = '';
			});

			document.addEventListener('mouseup', function () {
				blocker.style.display = 'none';
			});
		}

		function onWindowResize() {

			camera.aspect =
				window.innerWidth / window.innerHeight;

			camera.updateProjectionMatrix();

			cssRenderer.setSize(
				window.innerWidth,
				window.innerHeight
			);

			glRenderer.setSize(
				window.innerWidth,
				window.innerHeight
			);
		}

		function animate() {

			requestAnimationFrame(animate);

			controls.update();

			// Render webpage layer first
			cssRenderer.render(scene, camera);

			// Render 3D layer on top
			glRenderer.render(scene, camera);
		}

		function setupSpheres() {

			var sphereGeometry = new THREE.SphereGeometry(2, 32, 32);

			var sphereMaterial = new THREE.MeshBasicMaterial({
				color: 0x000000,
				wireframe: true
			});

			var phi = 161.8;
			var pos2 = 100;

			var positions = [
				[phi, pos2, 0],
				[phi, -pos2, 0],
				[-phi, pos2, 0],
				[-phi, -pos2, 0],

				[0, phi, pos2],
				[0, phi, -pos2],
				[0, -phi, pos2],
				[0, -phi, -pos2],

				[pos2, 0, phi],
				[-pos2, 0, phi],
				[pos2, 0, -phi],
				[-pos2, 0, -phi],
			];

			var triples = [
				[0, 1, 8],
				[0, 1, 10],

				[2, 3, 9],
				[2, 3, 11],

				[4, 5, 0],
				[4, 5, 2],

				[6, 7, 1],
				[6, 7, 3],

				[8, 9, 4],
				[8, 9, 6],

				[10, 11, 5],
				[10, 11, 7],

				[0, 4, 8],
				[0, 5, 10],

				[1, 6, 8],
				[1, 7, 10],

				[2, 4, 9],
				[2, 5, 11],

				[3, 6, 9],
				[3, 7, 11],
			];

			// -------------------------
			// SPHERES
			// -------------------------
			// for (var i = 0; i < positions.length; i++) {

			// 	var sphere = new THREE.Mesh(
			// 		sphereGeometry,
			// 		sphereMaterial
			// 	);

			// 	sphere.position.set(
			// 		positions[i][0],
			// 		positions[i][1],
			// 		positions[i][2]
			// 	);

			// 	scene.add(sphere);
			// }

			// -------------------------
			// INDEXED TRIANGLE GEOMETRY
			// -------------------------

			var faceGeometry = new THREE.BufferGeometry();

			// flatten vertices
			var verts = new Float32Array(positions.length * 3);

			for (var i = 0; i < positions.length; i++) {
				verts[i * 3 + 0] = positions[i][0];
				verts[i * 3 + 1] = positions[i][1];
				verts[i * 3 + 2] = positions[i][2];
			}

			faceGeometry.addAttribute(
				'position',
				new THREE.BufferAttribute(verts, 3)
			);

			// -------------------------
			// INDICES (IMPORTANT FIX)
			// -------------------------

			var indices = [];

			for (var i = 0; i < triples.length; i++) {
				indices.push(
					triples[i][0],
					triples[i][1],
					triples[i][2]
				);
			}

			// IMPORTANT: typed array (WebGL requirement in many builds)
			faceGeometry.setIndex(
				new THREE.BufferAttribute(
					new Uint16Array(indices),
					1
				)
			);

			// -------------------------
			// FACE COLORS
			// one RGB color per face
			// values are 0.0 -> 1.0
			// -------------------------

			var faceColors = [
				[1, 0, 0], // red
				[0, 1, 0], // green
				[0, 0, 1], // blue
				[1, 1, 0], // yellow

				[1, 0, 1], // magenta
				[0, 1, 1], // cyan
				[1, 0.5, 0], // orange
				[0.5, 0, 1], // purple

				[0.5, 1, 0.5],
				[1, 0.5, 0.5],
				[0.5, 0.5, 1],
				[1, 1, 1],

				[0.7, 0.2, 0.2],
				[0.2, 0.7, 0.2],
				[0.2, 0.2, 0.7],
				[0.7, 0.7, 0.2],

				[0.7, 0.2, 0.7],
				[0.2, 0.7, 0.7],
				[0.9, 0.4, 0.1],
				[0.3, 0.3, 0.3],
			];

			var colors = new Float32Array(positions.length * 3);

			// default white
			for (var i = 0; i < colors.length; i++) {
				colors[i] = 1.0;
			}

			// assign colors from faceColors array
			for (var i = 0; i < triples.length; i++) {

				var color = faceColors[i % faceColors.length];

				var r = color[0];
				var g = color[1];
				var b = color[2];

				var a = triples[i][0];
				var b2 = triples[i][1];
				var c = triples[i][2];

				colors[a * 3 + 0] = r;
				colors[a * 3 + 1] = g;
				colors[a * 3 + 2] = b;

				colors[b2 * 3 + 0] = r;
				colors[b2 * 3 + 1] = g;
				colors[b2 * 3 + 2] = b;

				colors[c * 3 + 0] = r;
				colors[c * 3 + 1] = g;
				colors[c * 3 + 2] = b;
			}

			faceGeometry.addAttribute(
				'color',
				new THREE.BufferAttribute(colors, 3)
			);

			faceGeometry.computeVertexNormals();

			var faceMaterial = new THREE.MeshBasicMaterial({
				vertexColors: true,
				side: THREE.DoubleSide
			});

			var mesh = new THREE.Mesh(faceGeometry, faceMaterial);

			scene.add(mesh);
		}
	</script>

</body>

</html>
