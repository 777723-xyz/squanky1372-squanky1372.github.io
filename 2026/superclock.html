<html>

<head>
	<title>Felipe</title>
	<style>
		body {
			margin: 0;
		}

		canvas {
			width: 100%;
			height: 100%
		}
	</style>
</head>

<body>
	<script src="../../../js/src/p5.js"></script>
	<script>
		var t = 0;
		function setup() {
			createCanvas(windowWidth, windowHeight);

			background(220);
			textSize(32);
			fill(200, 200, 255);
		}

		function draw() {
			c_len = min(windowWidth, windowHeight)
			background(0)
			t += 0.01

			let now = new Date();

			let year = now.getFullYear();
			let month = now.getMonth() + 1; // months are 0-11
			let day = now.getDate();
			let weekday = now.getDay();
			let dayOfMonth = now.getDate()

			let hour = now.getHours();
			let minute = now.getMinutes();
			let second = now.getSeconds();

			// Decade
			let decadeStartYear = Math.floor(year / 10) * 10;
			let decadeStart = new Date(decadeStartYear, 0, 1);
			let decadeEnd = new Date(decadeStartYear + 10, 0, 1);

			let decadeProgress =
				(now - decadeStart) / (decadeEnd - decadeStart);

			// Century
			let centuryStartYear = Math.floor(year / 100) * 100;
			let centuryStart = new Date(centuryStartYear, 0, 1);
			let centuryEnd = new Date(centuryStartYear + 100, 0, 1);

			let centuryProgress =
				(now - centuryStart) / (centuryEnd - centuryStart);

			// console.log(year, month, day, (hour % 12) / 12, minute, second)

			secondProgress = (second / 60)
			minuteProgress = ((minute + secondProgress) / 60)
			hourProgress = ((hour % 24 + minuteProgress) / 24)

			dayProgress = ((hour + minuteProgress) / 12)
			weekProgress = ((weekday + dayProgress) / 7)

			monthProgress = dayOfMonth / new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

			yearProgress = (now - new Date(now.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24) / 365

			translate(width / 2, height / 2)
			strokeWeight(10)

			clockFace(centuryProgress, 10, 8 / 8, "blue");
			clockFace(decadeProgress,  10, 7 / 8, "green");

			clockFace(yearProgress, 10, 6 / 8, "red")
			clockFace(monthProgress, 10, 5 / 8, "yellow")
			clockFace(weekProgress, 10, 4 / 8, "purple")

			clockFace(hourProgress, 10, 3 / 8, "orange")
			clockFace(minuteProgress, 10, 2 / 8, "pink")
			clockFace(secondProgress, 10, 1 / 8, "brown")
		}

		function windowResized() {
			resizeCanvas(windowWidth, windowHeight);
		}

		function radianLine(angle, length, width) {
			strokeWeight(width)
			angle = - (angle - Math.PI / 2)
			line(0, 0, length * Math.cos(angle), -length * Math.sin(angle))
		}

		function clockFace(angle, hand_length, scaler = 1, color) {
			push()
			scale(scaler * 0.95)

			noStroke()
			fill(0)
			circle(0, 0, c_len)

			fill(color)
			arc(0, 0, c_len, c_len, -HALF_PI, angle * TWO_PI - HALF_PI, PIE)

			// outline circle
			noFill()
			stroke(0)
			strokeWeight(10)
			circle(0, 0, c_len)

			// hand
			radianLine(angle * TWO_PI, c_len / 2, hand_length)

			pop()
		}

	</script>
</body>

</html>
